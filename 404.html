<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Cookedwater.com</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <script>
            async function getQuote() {
                const response = await fetch(
                    "https://shrekofficial.com/quotes/random",
                );
                if (!response.ok) {
                    throw new Error(`ERROR!! ${response.status}`);
                }
                const data = await response.json(); // Wait for the body to be parsed as JSON
                console.log(data);

                // Add to the thing
                document.getElementById("quote").innerText =
                    `"${data}" -- Shrek`;
            }
            document.addEventListener("DOMContentLoaded", () => {
                getQuote();
            });
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Average+Sans&display=swap"
            rel="stylesheet"
        />

        <meta name="darkreader-lock" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>

    <body class="bg-black text-white dark:!bg-gray-50 dark:!text-black">
        <h1 class="text-3xl text-center m-5">Page not found</h1>
        <a
            class="text-center bg-gray-900 dark:bg-gray-100 w-auto m-10 p-3 rounded-lg hover:underline hover:rounded-full hover:text-5xl transition-all hover:p-20 hover:m-30 hover:grayscale-100"
            href="index.html"
            >Back to CookedWater home</a
        >

        <p
            id="quote"
            class="text-center bg-gray-900 dark:bg-gray-100 w-auto m-10 p-3 rounded-lg"
            onclick="getQuote()"
        >
            Loading...
        </p>

        <h2 class="text-2xl p-3">Our sponsors</h2>

        <!-- Copy/paste this to add another sponsor -->
        <a
            href="https://sites.google.com/view/samweather"
            class="text-5xl text-center rounded-md text-black p-10 m-10 transition-all hover:scale-102"
            style="
                font-family: &quot;Average Sans&quot;;
                background-color: #afbdec;
                display: block;
            "
            >SamWeather</a
        >
        <a
            href="https://seabass-co.printful.me"
            class="text-5xl text-center rounded-md text-black p-10 m-10 transition-all hover:scale-102"
            style="
                font-family: system-ui;
                background-color: #dedede;
                display: block;
            "
            >Seabass Co</a
        >
    </body>
</html>
