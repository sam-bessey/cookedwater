<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Cookedwater.com</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script>
            async function getQuote() {
                const response = await fetch("https://api.kanye.rest");
                if (!response.ok) {
                    throw new Error(`ERROR!! ${response.status}`);
                }
                const data = await response.json(); // Wait for the body to be parsed as JSON
                console.log(data);

                // Add to the thing
                document.getElementById("quote").innerText =
                    `"${data.quote}" -- Kanye West`;
            }
            document.addEventListener("DOMContentLoaded", () => {
                getQuote();
            });
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Average+Sans&display=swap"
            rel="stylesheet"
        />
        <meta name="darkreader-lock" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body class="bg-black text-white dark:!bg-gray-50 dark:!text-black">
        <h1 class="text-xl">Page not found</h1>
        <p
            id="quote"
            class="text-lg text-center bg-gray-900 dark:bg-gray-100 w-auto m-10 p-3 rounded-lg"
            onclick="getQuote()"
        >
            Loading...
        </p>
    </body>
</html>
