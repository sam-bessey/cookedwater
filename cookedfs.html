<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HORIZON — FLIGHT SIMULATOR</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #000;
                overflow: hidden;
            }
            canvas#c {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
            }

            #hud {
                position: fixed;
                inset: 0;
                pointer-events: none;
                font-family: "Share Tech Mono", monospace;
                color: #39ffa0;
                text-shadow: 0 0 8px rgba(57, 255, 160, 0.7);
            }

            .label {
                font-size: 9px;
                letter-spacing: 3px;
                opacity: 0.55;
                margin-bottom: 3px;
                text-transform: uppercase;
            }

            .hud-box {
                position: absolute;
                border: 1px solid rgba(57, 255, 160, 0.25);
                background: rgba(0, 5, 10, 0.55);
                backdrop-filter: blur(4px);
                padding: 10px 14px;
            }

            /* ── Top Bar ── */
            #topbar {
                top: 0;
                left: 0;
                right: 0;
                border: none;
                border-bottom: 1px solid rgba(57, 255, 160, 0.18);
                padding: 7px 22px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 11px;
                letter-spacing: 2px;
                opacity: 0.8;
            }
            #topbar span:nth-child(2) {
                opacity: 0.4;
                font-size: 10px;
            }

            /* ── Speed (left) ── */
            #speed-box {
                left: 22px;
                top: 50%;
                transform: translateY(-50%);
                width: 76px;
                text-align: right;
            }
            #speed-box .big {
                font-size: 28px;
                font-family: "Orbitron", monospace;
                line-height: 1;
            }
            #speed-box .unit {
                font-size: 9px;
                letter-spacing: 3px;
                opacity: 0.5;
            }

            /* Speed tape */
            #speed-tape {
                position: absolute;
                left: 100px;
                top: 50%;
                transform: translateY(-50%);
                width: 44px;
                height: 200px;
                border: 1px solid rgba(57, 255, 160, 0.2);
                background: rgba(0, 5, 10, 0.6);
                overflow: hidden;
            }
            #speed-tape-inner {
                position: absolute;
                left: 0;
                right: 0;
            }
            .tape-mark {
                position: absolute;
                right: 0;
                font-size: 9px;
                line-height: 1;
                padding-right: 4px;
                color: rgba(57, 255, 160, 0.6);
                border-top: 1px solid rgba(57, 255, 160, 0.2);
                width: 100%;
            }
            .tape-mark.major {
                color: rgba(57, 255, 160, 0.9);
                font-size: 10px;
            }
            .tape-center-line {
                position: absolute;
                top: 50%;
                left: 0;
                right: 0;
                height: 1px;
                background: #39ffa0;
                box-shadow: 0 0 6px #39ffa0;
                z-index: 10;
                pointer-events: none;
            }

            /* ── Altitude (right) ── */
            #alt-box {
                right: 22px;
                top: 50%;
                transform: translateY(-50%);
                width: 76px;
                text-align: left;
            }
            #alt-box .big {
                font-size: 28px;
                font-family: "Orbitron", monospace;
                line-height: 1;
            }
            #alt-box .unit {
                font-size: 9px;
                letter-spacing: 3px;
                opacity: 0.5;
            }

            #alt-tape {
                position: absolute;
                right: 100px;
                top: 50%;
                transform: translateY(-50%);
                width: 44px;
                height: 200px;
                border: 1px solid rgba(57, 255, 160, 0.2);
                background: rgba(0, 5, 10, 0.6);
                overflow: hidden;
            }
            #alt-tape-inner {
                position: absolute;
                left: 0;
                right: 0;
            }

            /* ── Artificial Horizon (center) ── */
            #horizon-wrap {
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
            }

            /* ── Stall Warning ── */
            #stall {
                position: absolute;
                top: 72px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 13px;
                letter-spacing: 5px;
                color: #ff3c3c;
                text-shadow: 0 0 16px rgba(255, 60, 60, 0.9);
                display: none;
                animation: blink 0.45s infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            /* ── Compass ── */
            #compass-wrap {
                position: absolute;
                bottom: 22px;
                left: 50%;
                transform: translateX(-50%);
                text-align: center;
                width: 300px;
            }
            #compass-bar {
                height: 28px;
                border: 1px solid rgba(57, 255, 160, 0.25);
                background: rgba(0, 5, 10, 0.6);
                overflow: hidden;
                position: relative;
            }
            #compass-bar::after {
                content: "▼";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                color: #39ffa0;
                font-size: 10px;
                line-height: 10px;
            }
            #compass-inner {
                position: absolute;
                white-space: nowrap;
                font-size: 10px;
                letter-spacing: 1px;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            #hdg-readout {
                font-size: 11px;
                letter-spacing: 2px;
                margin-top: 4px;
                opacity: 0.7;
            }

            /* ── Throttle ── */
            #throttle-box {
                bottom: 22px;
                left: 22px;
            }
            #thr-bar-wrap {
                display: flex;
                align-items: flex-end;
                gap: 8px;
                margin-top: 6px;
            }
            #thr-bar-bg {
                width: 14px;
                height: 70px;
                border: 1px solid rgba(57, 255, 160, 0.3);
                background: rgba(0, 0, 0, 0.4);
                position: relative;
                overflow: hidden;
            }
            #thr-bar-fill {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                background: linear-gradient(to top, #39ffa0, #ffe039, #ff4444);
                transition: height 0.1s;
            }
            #thr-pct {
                font-size: 14px;
                font-family: "Orbitron", monospace;
            }

            /* ── Vario (vertical speed) ── */
            #vario-box {
                bottom: 22px;
                right: 22px;
                text-align: right;
            }
            #vario-val {
                font-size: 18px;
                font-family: "Orbitron", monospace;
            }

            /* ── Controls Help ── */
            #controls-help {
                position: absolute;
                top: 46px;
                right: 22px;
                font-size: 10px;
                letter-spacing: 1px;
                opacity: 0.35;
                line-height: 2;
                text-align: right;
            }

            /* ── Camera mode badge ── */
            #cam-badge {
                position: absolute;
                top: 46px;
                left: 22px;
                font-size: 10px;
                letter-spacing: 3px;
                opacity: 0.5;
            }

            /* ── Crash Screen ── */
            #crash-screen {
                position: fixed;
                inset: 0;
                background: rgba(180, 0, 0, 0.25);
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: "Orbitron", monospace;
                pointer-events: all;
            }
            #crash-screen h1 {
                font-size: 72px;
                color: #ff4444;
                text-shadow:
                    0 0 60px rgba(255, 68, 68, 1),
                    0 0 120px rgba(255, 68, 68, 0.4);
                letter-spacing: 10px;
                animation: shake 0.1s infinite;
            }
            @keyframes shake {
                0% {
                    transform: translate(2px, 1px) rotate(0deg);
                }
                25% {
                    transform: translate(-2px, -1px) rotate(-0.5deg);
                }
                50% {
                    transform: translate(-2px, 2px) rotate(0.5deg);
                }
                75% {
                    transform: translate(2px, -2px) rotate(-0.5deg);
                }
                100% {
                    transform: translate(1px, -1px) rotate(0deg);
                }
            }
            #crash-screen p {
                margin-top: 16px;
                color: rgba(255, 160, 160, 0.8);
                font-size: 12px;
                letter-spacing: 4px;
                font-family: "Share Tech Mono", monospace;
            }
            #crash-stats {
                margin-top: 12px;
                color: rgba(255, 160, 160, 0.5);
                font-size: 11px;
                letter-spacing: 2px;
                font-family: "Share Tech Mono", monospace;
                line-height: 2;
            }
            #restart-btn {
                margin-top: 32px;
                padding: 12px 40px;
                background: transparent;
                border: 1px solid #ff4444;
                color: #ff4444;
                font-family: "Orbitron", monospace;
                font-size: 12px;
                letter-spacing: 5px;
                cursor: pointer;
                transition: all 0.2s;
            }
            #restart-btn:hover {
                background: rgba(255, 68, 68, 0.15);
                box-shadow: 0 0 25px rgba(255, 68, 68, 0.4);
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>

        <div id="hud">
            <div class="hud-box" id="topbar">
                <span
                    >HORIZON <span style="opacity: 0.3">|</span> FLIGHT
                    SIMULATOR</span
                >
                <span id="coords">0.00°N &nbsp; 0.00°E</span>
                <span id="elapsed">00:00</span>
            </div>

            <!-- Speed -->
            <div class="hud-box" id="speed-box">
                <div class="label">SPEED</div>
                <div class="big" id="speed-val">0</div>
                <div class="unit">KTS</div>
            </div>
            <div id="speed-tape">
                <div class="tape-center-line"></div>
                <div id="speed-tape-inner"></div>
            </div>

            <!-- Altitude -->
            <div class="hud-box" id="alt-box">
                <div class="label">ALTITUDE</div>
                <div class="big" id="alt-val">0</div>
                <div class="unit">FT</div>
            </div>
            <div id="alt-tape">
                <div class="tape-center-line"></div>
                <div id="alt-tape-inner"></div>
            </div>

            <!-- Horizon -->
            <div id="horizon-wrap">
                <canvas id="adi" width="200" height="200"></canvas>
            </div>

            <!-- Stall -->
            <div id="stall">⚠ STALL ⚠</div>

            <!-- Compass -->
            <div id="compass-wrap">
                <div class="label" style="text-align: center">HEADING</div>
                <div id="compass-bar"><div id="compass-inner"></div></div>
                <div id="hdg-readout">
                    <span id="hdg-deg">000</span>° &nbsp;
                    <span id="hdg-card">N</span>
                </div>
            </div>

            <!-- Throttle -->
            <div class="hud-box" id="throttle-box">
                <div class="label">THROTTLE</div>
                <div id="thr-bar-wrap">
                    <div id="thr-bar-bg"><div id="thr-bar-fill"></div></div>
                    <div id="thr-pct">0%</div>
                </div>
            </div>

            <!-- Vario -->
            <div class="hud-box" id="vario-box">
                <div class="label">VERT SPEED</div>
                <div class="big" id="vario-val">+0</div>
                <div class="unit">FPM</div>
            </div>

            <div id="cam-badge">[ <span id="cam-name">CHASE CAM</span> ]</div>

            <div id="controls-help">
                ↑↓ &nbsp;PITCH<br />
                ←→ &nbsp;ROLL<br />
                A / D &nbsp; YAW<br />
                W / S &nbsp; THROTTLE<br />
                V &nbsp;&nbsp;&nbsp;&nbsp;CAMERA
            </div>
        </div>

        <div id="crash-screen">
            <h1>IMPACT</h1>
            <p>TERRAIN COLLISION DETECTED</p>
            <div id="crash-stats"></div>
            <button id="restart-btn" onclick="restartGame()">
                [ RESTART ]
            </button>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script>
            "use strict";
            // ═══════════════════════════════════════════════════════════
            //  HORIZON FLIGHT SIMULATOR
            // ═══════════════════════════════════════════════════════════

            let scene, camera, renderer, planeMesh, terrainMesh;
            let cameraMode = 0; // 0 = chase, 1 = cockpit
            let crashed = false;
            let startTime = Date.now();
            let flightTime = 0;

            // ── Plane State ──────────────────────────────────────────
            const S = {
                pos: new THREE.Vector3(200, 420, 200),
                vel: new THREE.Vector3(0, 0, -80),
                pitch: 0, // rad
                roll: 0, // rad
                yaw: Math.PI, // start facing -Z
                airspeed: 80,
                throttle: 0.45,
                prevY: 420,
            };

            const keys = {};
            const PITCH_RATE = 0.9,
                ROLL_RATE = 1.1,
                YAW_RATE = 0.35;
            const STALL_SPEED = 38;

            // ── Noise Helpers ─────────────────────────────────────────
            function hash2(x, z) {
                const n = Math.sin(x * 127.1 + z * 311.7 + 53.21) * 43758.5453;
                return n - Math.floor(n);
            }
            function smoothstep(t) {
                return t * t * (3 - 2 * t);
            }
            function lerp(a, b, t) {
                return a + (b - a) * t;
            }
            function vnoise(x, z) {
                const ix = Math.floor(x),
                    iz = Math.floor(z);
                const fx = smoothstep(x - ix),
                    fz = smoothstep(z - iz);
                return lerp(
                    lerp(hash2(ix, iz), hash2(ix + 1, iz), fx),
                    lerp(hash2(ix, iz + 1), hash2(ix + 1, iz + 1), fx),
                    fz,
                );
            }
            function fbm(x, z) {
                let v = 0,
                    a = 0.5,
                    f = 1,
                    mx = 0;
                for (let i = 0; i < 7; i++) {
                    v += a * vnoise(x * f * 0.00045, z * f * 0.00045);
                    mx += a;
                    a *= 0.5;
                    f *= 2.05;
                }
                return v / mx;
            }
            function terrainH(x, z) {
                const n = fbm(x, z);
                return Math.pow(Math.max(0, n - 0.15) / 0.85, 1.6) * 720 - 8;
            }

            // ── Init ──────────────────────────────────────────────────
            function init() {
                renderer = new THREE.WebGLRenderer({
                    canvas: document.getElementById("c"),
                    antialias: true,
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 0.9;

                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x9fbbd4, 0.000075);

                camera = new THREE.PerspectiveCamera(
                    72,
                    innerWidth / innerHeight,
                    0.5,
                    18000,
                );

                buildSky();
                buildLights();
                buildTerrain();
                buildWater();
                buildClouds();
                buildAircraft();
                buildRunway();

                window.addEventListener("keydown", (e) => {
                    keys[e.code] = true;
                    if (
                        [
                            "ArrowUp",
                            "ArrowDown",
                            "ArrowLeft",
                            "ArrowRight",
                            "Space",
                        ].includes(e.code)
                    )
                        e.preventDefault();
                });
                window.addEventListener("keyup", (e) => {
                    keys[e.code] = false;
                    if (e.code === "KeyV") {
                        cameraMode = (cameraMode + 1) % 2;
                        updateCamBadge();
                    }
                });
                window.addEventListener("resize", () => {
                    camera.aspect = innerWidth / innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(innerWidth, innerHeight);
                });

                loop();
            }

            // ── Sky ───────────────────────────────────────────────────
            function buildSky() {
                const geo = new THREE.SphereGeometry(12000, 32, 16);
                const mat = new THREE.ShaderMaterial({
                    uniforms: {
                        uZen: { value: new THREE.Color(0x060e24) },
                        uMid: { value: new THREE.Color(0x2e6fa8) },
                        uHor: { value: new THREE.Color(0xbcd6e8) },
                    },
                    vertexShader: `varying vec3 vWP; void main(){ vWP=(modelMatrix*vec4(position,1.)).xyz; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
                    fragmentShader: `
      uniform vec3 uZen,uMid,uHor;
      varying vec3 vWP;
      void main(){
        float t=normalize(vWP).y*.5+.5;
        vec3 c=t>.5?mix(uMid,uZen,(t-.5)*2.):mix(uHor,uMid,t*2.);
        gl_FragColor=vec4(c,1.);
      }`,
                    side: THREE.BackSide,
                    depthWrite: false,
                });
                scene.add(new THREE.Mesh(geo, mat));
            }

            // ── Lights ────────────────────────────────────────────────
            function buildLights() {
                scene.add(new THREE.AmbientLight(0xd0e8ff, 0.45));

                const sun = new THREE.DirectionalLight(0xfff0d0, 1.3);
                sun.position.set(3000, 4000, -1500);
                sun.castShadow = true;
                const sc = sun.shadow.camera;
                sc.near = 1;
                sc.far = 10000;
                sc.left = -3500;
                sc.right = 3500;
                sc.top = 3500;
                sc.bottom = -3500;
                sun.shadow.mapSize.set(2048, 2048);
                sun.shadow.bias = -0.0003;
                scene.add(sun);

                scene.add(new THREE.HemisphereLight(0x7fb2d8, 0x4d6e38, 0.55));
            }

            // ── Terrain ───────────────────────────────────────────────
            function buildTerrain() {
                const SIZE = 9000,
                    SEGS = 140;
                const geo = new THREE.PlaneGeometry(SIZE, SIZE, SEGS, SEGS);
                geo.rotateX(-Math.PI / 2);

                const pos = geo.attributes.position;
                const col = new Float32Array(pos.count * 3);

                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i),
                        z = pos.getZ(i);
                    const h = terrainH(x, z);
                    pos.setY(i, h);

                    let r, g, b;
                    if (h < 0) {
                        r = 0.12;
                        g = 0.28;
                        b = 0.52;
                    } // shallow water
                    else if (h < 20) {
                        r = 0.72;
                        g = 0.65;
                        b = 0.48;
                    } // sand/beach
                    else if (h < 100) {
                        r = 0.26;
                        g = 0.48;
                        b = 0.2;
                    } // lowland grass
                    else if (h < 280) {
                        r = 0.22;
                        g = 0.4;
                        b = 0.16;
                    } // forest
                    else if (h < 420) {
                        r = 0.4;
                        g = 0.34;
                        b = 0.24;
                    } // rock
                    else if (h < 560) {
                        r = 0.55;
                        g = 0.5;
                        b = 0.44;
                    } // bare rock
                    else {
                        r = 0.88;
                        g = 0.91;
                        b = 0.95;
                    } // snow
                    col[i * 3] = r;
                    col[i * 3 + 1] = g;
                    col[i * 3 + 2] = b;
                }
                geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
                geo.computeVertexNormals();

                terrainMesh = new THREE.Mesh(
                    geo,
                    new THREE.MeshLambertMaterial({ vertexColors: true }),
                );
                terrainMesh.receiveShadow = true;
                scene.add(terrainMesh);
            }

            // ── Water ────────────────────────────────────────────────
            function buildWater() {
                const geo = new THREE.PlaneGeometry(9000, 9000, 1, 1);
                geo.rotateX(-Math.PI / 2);
                const mat = new THREE.MeshLambertMaterial({
                    color: 0x0f4a80,
                    transparent: true,
                    opacity: 0.82,
                });
                const m = new THREE.Mesh(geo, mat);
                m.position.y = 0.5;
                scene.add(m);
            }

            // ── Clouds ────────────────────────────────────────────────
            function buildClouds() {
                const mat = new THREE.MeshLambertMaterial({
                    color: 0xf0f4ff,
                    transparent: true,
                    opacity: 0.88,
                });
                for (let c = 0; c < 55; c++) {
                    const g = new THREE.Group();
                    const n = 4 + Math.floor(Math.random() * 5);
                    for (let k = 0; k < n; k++) {
                        const r = 35 + Math.random() * 65;
                        const mesh = new THREE.Mesh(
                            new THREE.SphereGeometry(r, 7, 5),
                            mat,
                        );
                        mesh.position.set(
                            (Math.random() - 0.5) * 200,
                            (Math.random() - 0.5) * 35,
                            (Math.random() - 0.5) * 120,
                        );
                        g.add(mesh);
                    }
                    g.position.set(
                        (Math.random() - 0.5) * 7000,
                        420 + Math.random() * 900,
                        (Math.random() - 0.5) * 7000,
                    );
                    g.rotation.y = Math.random() * Math.PI * 2;
                    scene.add(g);
                }
            }

            // ── Runway ────────────────────────────────────────────────
            function buildRunway() {
                const rwy = new THREE.Group();
                // Runway surface
                const geo = new THREE.PlaneGeometry(40, 500);
                geo.rotateX(-Math.PI / 2);
                const mat = new THREE.MeshLambertMaterial({ color: 0x333333 });
                const mesh = new THREE.Mesh(geo, mat);
                // Position on terrain
                const h = terrainH(0, 0);
                mesh.position.set(0, Math.max(h, 2) + 0.5, 0);
                rwy.add(mesh);

                // Centerline dashes
                const dashMat = new THREE.MeshLambertMaterial({
                    color: 0xffffff,
                });
                for (let i = -10; i <= 10; i++) {
                    const dg = new THREE.PlaneGeometry(3, 18);
                    dg.rotateX(-Math.PI / 2);
                    const dm = new THREE.Mesh(dg, dashMat);
                    dm.position.set(0, Math.max(h, 2) + 0.6, i * 30);
                    rwy.add(dm);
                }
                scene.add(rwy);
            }

            // ── Aircraft ──────────────────────────────────────────────
            function buildAircraft() {
                planeMesh = new THREE.Group();

                const metal = new THREE.MeshLambertMaterial({
                    color: 0xcccccc,
                });
                const dark = new THREE.MeshLambertMaterial({ color: 0x888888 });
                const canopy = new THREE.MeshLambertMaterial({
                    color: 0x3399cc,
                    transparent: true,
                    opacity: 0.6,
                });
                const engine = new THREE.MeshLambertMaterial({
                    color: 0x999999,
                });
                const exhaust = new THREE.MeshBasicMaterial({
                    color: 0xff5500,
                });
                const nav_r = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const nav_g = new THREE.MeshBasicMaterial({ color: 0x00ff44 });

                // Fuselage (tapered cylinder)
                const fbody = new THREE.Mesh(
                    new THREE.CylinderGeometry(2.2, 1.2, 32, 10),
                    metal,
                );
                fbody.rotateX(Math.PI / 2);
                planeMesh.add(fbody);

                // Nose cone
                const nose = new THREE.Mesh(
                    new THREE.ConeGeometry(2.2, 8, 10),
                    metal,
                );
                nose.rotateX(-Math.PI / 2);
                nose.position.z = -20;
                planeMesh.add(nose);

                // Canopy
                const cap = new THREE.Mesh(
                    new THREE.SphereGeometry(
                        2.8,
                        10,
                        6,
                        0,
                        Math.PI * 2,
                        0,
                        Math.PI * 0.5,
                    ),
                    canopy,
                );
                cap.position.set(0, 2.5, -6);
                planeMesh.add(cap);

                // Main wings
                const wing = new THREE.Mesh(
                    new THREE.BoxGeometry(30, 0.7, 9),
                    metal,
                );
                wing.position.set(0, 0, 2);
                planeMesh.add(wing);

                // Wing tips (angled)
                for (const s of [-1, 1]) {
                    const tip = new THREE.Mesh(
                        new THREE.BoxGeometry(4, 0.5, 3),
                        metal,
                    );
                    tip.position.set(s * 16, 1, 2);
                    tip.rotation.z = s * 0.3;
                    planeMesh.add(tip);
                }

                // Horizontal stabilizer
                const hstab = new THREE.Mesh(
                    new THREE.BoxGeometry(14, 0.55, 4.5),
                    metal,
                );
                hstab.position.set(0, 0.5, 13);
                planeMesh.add(hstab);

                // Vertical stabilizer
                const vstab = new THREE.Mesh(
                    new THREE.BoxGeometry(0.9, 6, 5),
                    dark,
                );
                vstab.position.set(0, 4.5, 13);
                planeMesh.add(vstab);

                // Engines (x2)
                for (const s of [-1, 1]) {
                    const eng = new THREE.Mesh(
                        new THREE.CylinderGeometry(1.8, 1.5, 10, 10),
                        engine,
                    );
                    eng.rotateX(Math.PI / 2);
                    eng.position.set(s * 9, -2.2, 0);
                    planeMesh.add(eng);

                    const exhaust_m = new THREE.Mesh(
                        new THREE.CircleGeometry(1.5, 10),
                        exhaust,
                    );
                    exhaust_m.position.set(s * 9, -2.2, 6);
                    planeMesh.add(exhaust_m);
                }

                // Nav lights
                const nl = (s) => {
                    const m = new THREE.Mesh(
                        new THREE.SphereGeometry(0.5, 6, 5),
                        s < 0 ? nav_r : nav_g,
                    );
                    m.position.set(s * 15.5, 0.5, 2);
                    planeMesh.add(m);
                };
                nl(-1);
                nl(1);

                planeMesh.castShadow = true;
                scene.add(planeMesh);
            }

            // ── Physics ───────────────────────────────────────────────
            const _qYaw = new THREE.Quaternion();
            const _qPitch = new THREE.Quaternion();
            const _qRoll = new THREE.Quaternion();
            const _euler = new THREE.Euler();
            const AX = new THREE.Vector3(1, 0, 0);
            const AY = new THREE.Vector3(0, 1, 0);
            const AZ = new THREE.Vector3(0, 0, 1);

            function buildQ() {
                _qYaw.setFromAxisAngle(AY, S.yaw);
                _qPitch.setFromAxisAngle(AX, S.pitch);
                _qRoll.setFromAxisAngle(AZ, S.roll);
                return _qYaw.clone().multiply(_qPitch).multiply(_qRoll);
            }

            function updatePhysics(dt) {
                // ── Controls ─────
                if (keys["ArrowUp"]) S.pitch -= PITCH_RATE * dt;
                if (keys["ArrowDown"]) S.pitch += PITCH_RATE * dt;
                if (keys["ArrowLeft"]) S.roll -= ROLL_RATE * dt;
                if (keys["ArrowRight"]) S.roll += ROLL_RATE * dt;
                if (keys["KeyA"]) S.yaw += YAW_RATE * dt;
                if (keys["KeyD"]) S.yaw -= YAW_RATE * dt;
                if (keys["KeyW"])
                    S.throttle = Math.min(1, S.throttle + 0.55 * dt);
                if (keys["KeyS"])
                    S.throttle = Math.max(0, S.throttle - 0.55 * dt);

                // Bank-to-turn
                S.yaw -= S.roll * 0.38 * dt;

                // Clamp attitude
                S.pitch = Math.max(
                    -Math.PI * 0.48,
                    Math.min(Math.PI * 0.48, S.pitch),
                );
                S.roll = Math.max(
                    -Math.PI * 0.82,
                    Math.min(Math.PI * 0.82, S.roll),
                );

                // ── Airspeed ─────
                const maxSpd = 310;
                const targetSpd = S.throttle * maxSpd;
                S.airspeed += (targetSpd - S.airspeed) * dt * 0.55;
                S.airspeed = Math.max(0, Math.min(maxSpd * 1.25, S.airspeed));

                const stalled = S.airspeed < STALL_SPEED;

                // ── Orientation & velocity ─────
                const q = buildQ();
                const nose = new THREE.Vector3(0, 0, -1).applyQuaternion(q);
                const intended = nose.multiplyScalar(S.airspeed);

                // Velocity lerps toward nose direction
                const trackRate = stalled ? 0.4 : 4.0;
                S.vel.lerp(intended, Math.min(1, trackRate * dt));

                // Extra gravity when stalled
                if (stalled) S.vel.y -= 160 * dt;

                // Move
                S.prevY = S.pos.y;
                S.pos.addScaledVector(S.vel, dt);

                // ── Terrain collision ─────
                const gh = terrainH(S.pos.x, S.pos.z);
                if (S.pos.y <= gh + 7) {
                    if (!crashed) {
                        const impactSpd = S.vel.length();
                        if (impactSpd > 20) {
                            triggerCrash(impactSpd);
                            return;
                        }
                    }
                    S.pos.y = gh + 7;
                    if (S.vel.y < 0) S.vel.y = 0;
                    S.vel.multiplyScalar(0.96);
                }

                // ── Update mesh ─────
                planeMesh.position.copy(S.pos);
                planeMesh.quaternion.copy(q);
                planeMesh.visible = cameraMode === 0;

                document.getElementById("stall").style.display = stalled
                    ? "block"
                    : "none";
            }

            // ── Camera ────────────────────────────────────────────────
            const camLerpPos = new THREE.Vector3();

            function updateCamera() {
                const q = buildQ();

                if (cameraMode === 0) {
                    // Chase cam
                    const offset = new THREE.Vector3(0, 11, 60).applyQuaternion(
                        q,
                    );
                    camLerpPos.lerp(S.pos.clone().add(offset), 0.09);
                    camera.position.copy(camLerpPos);
                    const lookAt = S.pos
                        .clone()
                        .add(new THREE.Vector3(0, 0, -40).applyQuaternion(q));
                    camera.lookAt(lookAt);
                } else {
                    // Cockpit cam (first person)
                    const offset = new THREE.Vector3(
                        0,
                        2.8,
                        -10,
                    ).applyQuaternion(q);
                    camera.position.copy(S.pos.clone().add(offset));
                    const lookAt = S.pos
                        .clone()
                        .add(new THREE.Vector3(0, 0, -300).applyQuaternion(q));
                    camera.lookAt(lookAt);
                    camLerpPos.copy(camera.position);
                }
            }

            // ── HUD ───────────────────────────────────────────────────
            function drawADI() {
                const cv = document.getElementById("adi");
                const ctx = cv.getContext("2d");
                const W = cv.width,
                    H = cv.height;
                const cx = W / 2,
                    cy = H / 2,
                    R = 90;

                ctx.clearRect(0, 0, W, H);

                // Clip circle
                ctx.save();
                ctx.beginPath();
                ctx.arc(cx, cy, R, 0, Math.PI * 2);
                ctx.clip();

                // Rotate for roll
                ctx.translate(cx, cy);
                ctx.rotate(-S.roll);

                const pOff = S.pitch * R * 2.2;

                // Sky
                const skyG = ctx.createLinearGradient(0, -R, 0, pOff);
                skyG.addColorStop(0, "#0a1a3a");
                skyG.addColorStop(1, "#2a6aaa");
                ctx.fillStyle = skyG;
                ctx.fillRect(-R, -R * 2, R * 2, R * 2 + pOff);

                // Ground
                const gndG = ctx.createLinearGradient(0, pOff, 0, R);
                gndG.addColorStop(0, "#3a5e28");
                gndG.addColorStop(1, "#1e321a");
                ctx.fillStyle = gndG;
                ctx.fillRect(-R, pOff, R * 2, R * 2);

                // Horizon line
                ctx.strokeStyle = "rgba(255,255,255,0.9)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-R, pOff);
                ctx.lineTo(R, pOff);
                ctx.stroke();

                // Pitch ladder
                ctx.font = "8px Share Tech Mono";
                ctx.textAlign = "center";
                for (const deg of [-20, -10, 10, 20]) {
                    const y = pOff - deg * R * 0.055;
                    const tw = Math.abs(deg) === 10 ? 22 : 32;
                    ctx.strokeStyle = "rgba(255,255,255,0.55)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-tw, y);
                    ctx.lineTo(tw, y);
                    ctx.stroke();
                    ctx.fillStyle = "rgba(255,255,255,0.7)";
                    ctx.fillText(Math.abs(deg), tw + 12, y + 3);
                    ctx.fillText(Math.abs(deg), -tw - 12, y + 3);
                }
                ctx.restore();

                // Aircraft symbol (fixed center)
                ctx.strokeStyle = "#39ffa0";
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 7;
                ctx.shadowColor = "#39ffa0";
                ctx.beginPath();
                ctx.moveTo(cx - 58, cy);
                ctx.lineTo(cx - 22, cy);
                ctx.lineTo(cx - 16, cy + 6);
                ctx.moveTo(cx + 58, cy);
                ctx.lineTo(cx + 22, cy);
                ctx.lineTo(cx + 16, cy + 6);
                ctx.moveTo(cx, cy - 7);
                ctx.lineTo(cx, cy + 7);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Outer ring
                ctx.strokeStyle = "rgba(57,255,160,0.35)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(cx, cy, R, 0, Math.PI * 2);
                ctx.stroke();

                // Roll indicator arc
                ctx.save();
                ctx.translate(cx, cy);
                for (const deg of [
                    -60, -45, -30, -20, -10, 0, 10, 20, 30, 45, 60,
                ]) {
                    ctx.save();
                    ctx.rotate((deg * Math.PI) / 180 - S.roll);
                    const len = deg % 30 === 0 ? 10 : deg % 10 === 0 ? 6 : 4;
                    ctx.strokeStyle = `rgba(57,255,160,${deg === 0 ? 0.9 : 0.5})`;
                    ctx.lineWidth = deg === 0 ? 2 : 1;
                    ctx.beginPath();
                    ctx.moveTo(0, -R + 1);
                    ctx.lineTo(0, -R + 1 + len);
                    ctx.stroke();
                    ctx.restore();
                }
                // Roll pointer triangle
                ctx.strokeStyle = "#39ffa0";
                ctx.fillStyle = "#39ffa0";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(-5, -R + 12);
                ctx.lineTo(0, -R + 2);
                ctx.lineTo(5, -R + 12);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function updateTapes() {
                const spd = Math.round(S.vel.length() * 1.944); // m/s to knots
                const alt = Math.round(S.pos.y * 3.281); // m to feet
                document.getElementById("speed-val").textContent = spd;
                document.getElementById("alt-val").textContent = alt;

                // Speed tape
                const stInner = document.getElementById("speed-tape-inner");
                const TAPE_PX = 14; // px per unit
                const stH = 200;
                let stHtml = "";
                const spdMin = Math.max(0, spd - 40),
                    spdMax = spd + 40;
                for (
                    let s = Math.floor(spdMin / 10) * 10;
                    s <= spdMax;
                    s += 5
                ) {
                    const y = stH / 2 - ((s - spd) * TAPE_PX) / 5 - 7;
                    if (s % 10 === 0)
                        stHtml += `<div class="tape-mark major" style="top:${y}px">${s}</div>`;
                    else
                        stHtml += `<div class="tape-mark" style="top:${y}px"></div>`;
                }
                stInner.innerHTML = stHtml;

                // Alt tape
                const atInner = document.getElementById("alt-tape-inner");
                let atHtml = "";
                const altStep = 100,
                    pxPerAlt = 1.0;
                const altMin = alt - 1000,
                    altMax = alt + 1000;
                for (
                    let a = Math.floor(altMin / altStep) * altStep;
                    a <= altMax;
                    a += altStep
                ) {
                    const y =
                        stH / 2 -
                        (((a - alt) * pxPerAlt) / altStep) * TAPE_PX -
                        7;
                    if (a % 500 === 0)
                        atHtml += `<div class="tape-mark major" style="top:${y}px">${a}</div>`;
                    else
                        atHtml += `<div class="tape-mark" style="top:${y}px"></div>`;
                }
                atInner.innerHTML = atHtml;
            }

            function updateCompass() {
                const hdgRad = -S.yaw;
                let hdgDeg = ((((hdgRad * 180) / Math.PI) % 360) + 360) % 360;
                const CARDS = [
                    "N",
                    "NNE",
                    "NE",
                    "ENE",
                    "E",
                    "ESE",
                    "SE",
                    "SSE",
                    "S",
                    "SSW",
                    "SW",
                    "WSW",
                    "W",
                    "WNW",
                    "NW",
                    "NNW",
                ];

                // Build scrolling compass HTML
                const step = 5,
                    pxPerDeg = 2.5;
                let html = "";
                for (let d = -90; d <= 90; d += step) {
                    const actual = (((hdgDeg + d) % 360) + 360) % 360;
                    const label =
                        actual % 30 === 0
                            ? CARDS[Math.round(actual / 22.5) % 16]
                            : actual % 10 === 0
                              ? Math.round(actual)
                              : "·";
                    const weight = actual % 30 === 0 ? "font-weight:bold;" : "";
                    html += `<span style="${weight}display:inline-block;min-width:${pxPerDeg * step}px;text-align:center">${label}</span>`;
                }
                document.getElementById("compass-inner").innerHTML = html;
                document.getElementById("hdg-deg").textContent = String(
                    Math.round(hdgDeg),
                ).padStart(3, "0");
                document.getElementById("hdg-card").textContent =
                    CARDS[Math.round(hdgDeg / 22.5) % 16];
            }

            function updateHUD() {
                drawADI();
                updateTapes();
                updateCompass();

                // Throttle bar
                document.getElementById("thr-bar-fill").style.height =
                    S.throttle * 100 + "%";
                document.getElementById("thr-pct").textContent =
                    Math.round(S.throttle * 100) + "%";

                // Vertical speed
                const vspd = Math.round(
                    ((S.pos.y - S.prevY) / (1 / 60)) * 3.281 * 0.1,
                );
                const vsEl = document.getElementById("vario-val");
                vsEl.textContent = (vspd >= 0 ? "+" : "") + vspd;
                vsEl.style.color =
                    vspd < -200 ? "#ff5555" : vspd > 0 ? "#39ffa0" : "#fff";

                // Coords
                document.getElementById("coords").textContent =
                    `${(S.pos.z / 1000).toFixed(2)}°N &nbsp; ${(S.pos.x / 1000).toFixed(2)}°E`;

                // Elapsed time
                const t = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById("elapsed").textContent =
                    String(Math.floor(t / 60)).padStart(2, "0") +
                    ":" +
                    String(t % 60).padStart(2, "0");
            }

            function updateCamBadge() {
                document.getElementById("cam-name").textContent = [
                    "CHASE CAM",
                    "COCKPIT CAM",
                ][cameraMode];
            }

            // ── Crash ──────────────────────────────────────────────────
            function triggerCrash(impactSpd) {
                crashed = true;
                flightTime = Math.floor((Date.now() - startTime) / 1000);
                const maxAlt = Math.round(S.pos.y * 3.281);
                document.getElementById("crash-stats").innerHTML =
                    `AIRSPEED AT IMPACT: ${Math.round(impactSpd * 1.944)} KTS<br>
     FLIGHT TIME: ${String(Math.floor(flightTime / 60)).padStart(2, "0")}:${String(flightTime % 60).padStart(2, "0")}<br>
     POSITION: ${(S.pos.z / 1000).toFixed(2)}°N  ${(S.pos.x / 1000).toFixed(2)}°E`;
                document.getElementById("crash-screen").style.display = "flex";
            }

            function restartGame() {
                crashed = false;
                document.getElementById("crash-screen").style.display = "none";
                S.pos.set(200, 420, 200);
                S.vel.set(0, 0, -80);
                S.pitch = 0;
                S.roll = 0;
                S.yaw = Math.PI;
                S.airspeed = 80;
                S.throttle = 0.45;
                startTime = Date.now();
            }

            // ── Main Loop ─────────────────────────────────────────────
            let lastT = 0;

            function loop(ts = 0) {
                requestAnimationFrame(loop);
                const dt = Math.min((ts - lastT) / 1000, 0.05);
                lastT = ts;

                if (!crashed) updatePhysics(dt);
                updateCamera();
                updateHUD();
                renderer.render(scene, camera);
            }

            init();
        </script>
    </body>
</html>
