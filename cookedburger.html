<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍔 CookedBurger</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#ff9800; --bg:#0d0600; --card:#1e1000; --border:#3d2000;
  --gold:#ffd700; --text:#fff8ee; --glow:#ff980044; --accent2:#ffca28;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow:hidden;width:100%;height:100%;}
body{
  background:radial-gradient(ellipse at 30% 40%,#2a1200,#0d0600 70%);
  font-family:'Nunito',sans-serif;color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:none;user-select:none;position:relative;
  transition:background 1s ease;
}

/* ── CURSOR ── */
.mc{position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-60%);font-size:30px;}
.mc.chomp{animation:mch .18s ease-out;}
@keyframes mch{0%{transform:translate(-50%,-60%) scale(1)}40%{transform:translate(-50%,-60%) scale(1.5) rotate(-15deg)}100%{transform:translate(-50%,-60%) scale(1)}}
.mc.shop{transform:translate(-50%,-50%);}

/* ── HUD ── */
.hud{position:fixed;top:0;left:0;right:0;z-index:300;padding:9px 16px;display:flex;align-items:center;gap:8px;background:linear-gradient(to bottom,rgba(0,0,0,.88),transparent);}
.hud-logo{font-family:'Boogaloo',cursive;font-size:1.6rem;color:var(--accent);text-shadow:0 0 16px var(--glow),2px 2px 0 rgba(0,0,0,.5);white-space:nowrap;}
.hud-center{display:flex;gap:7px;flex:1;justify-content:center;flex-wrap:wrap;align-items:center;}
.sb{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:3px 11px;text-align:center;min-width:62px;}
.sb-l{font-size:.48rem;letter-spacing:2px;text-transform:uppercase;opacity:.55;}
.sb-v{font-family:'Boogaloo',cursive;font-size:1.3rem;color:var(--accent);}
.money-hud{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,152,0,.08));border:2px solid rgba(255,215,0,.45);border-radius:13px;padding:4px 13px;}
.mv{font-family:'Boogaloo',cursive;font-size:1.6rem;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.5);min-width:52px;}
.mv.bump{animation:bump .28s;}@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.hud-btns{display:flex;gap:7px;flex-shrink:0;}
.hbtn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#1a0800;font-family:'Boogaloo',cursive;font-size:.95rem;padding:7px 14px;border-radius:35px;cursor:none;box-shadow:0 3px 0 rgba(0,0,0,.4);transition:all .13s;white-space:nowrap;}
.hbtn:hover{transform:translateY(-2px);}
.hbtn:active{transform:translateY(1px);}
.hbtn.maps{background:linear-gradient(135deg,#5c6bc0,#9c27b0);}
.notif{display:inline-block;background:#f44336;color:#fff;border-radius:50%;width:16px;height:16px;font-size:.58rem;line-height:16px;text-align:center;margin-left:3px;vertical-align:middle;animation:pn 1s ease-in-out infinite;}
@keyframes pn{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}

/* map chip in HUD */
.map-chip{display:flex;align-items:center;gap:5px;border:1.5px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;background:rgba(255,255,255,.06);font-size:.8rem;white-space:nowrap;}

/* ── SHOP ── */
.shop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:900;opacity:0;pointer-events:none;transition:opacity .3s;}
.shop-overlay.open{opacity:1;pointer-events:all;}
.shop-panel{position:fixed;top:0;right:-470px;width:450px;height:100vh;background:linear-gradient(180deg,#1a0c00,#0d0500);border-left:2px solid rgba(255,255,255,.1);z-index:1000;overflow-y:auto;transition:right .4s cubic-bezier(.4,0,.2,1);}
.shop-panel.open{right:0;}
.shop-hdr{padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg,rgba(255,255,255,.06),transparent);position:sticky;top:0;z-index:10;backdrop-filter:blur(5px);}
.shop-hdr-row{display:flex;justify-content:space-between;align-items:center;}
.shop-title{font-family:'Boogaloo',cursive;font-size:1.8rem;color:var(--accent);}
.shop-close{background:rgba(255,80,0,.2);border:1px solid rgba(255,80,0,.4);color:#ff6040;font-size:1.2rem;width:32px;height:32px;border-radius:50%;cursor:none;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.shop-close:hover{transform:rotate(90deg);background:rgba(255,80,0,.35);}
.shop-bal{display:flex;align-items:center;gap:5px;margin-top:7px;font-family:'Boogaloo',cursive;font-size:1.1rem;color:var(--gold);}
.shop-bal small{opacity:.5;font-size:.7rem;font-family:'Nunito';}
.tab-row{display:flex;gap:3px;padding:9px 18px 0;border-bottom:1px solid rgba(255,255,255,.08);}
.tab{padding:5px 12px;border-radius:7px 7px 0 0;font-family:'Boogaloo',cursive;font-size:.85rem;cursor:none;background:transparent;border:none;color:rgba(255,255,255,.35);transition:all .16s;}
.tab.active{background:rgba(255,255,255,.1);color:var(--accent);}
.tab:hover:not(.active){color:rgba(255,255,255,.6);}
.upg-sec{padding:12px 16px;}
.upg-card{background:var(--card);border:2px solid var(--border);border-radius:13px;padding:11px 13px;margin-bottom:7px;transition:all .16s;position:relative;overflow:hidden;}
.upg-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent);pointer-events:none;}
.upg-card.affordable{border-color:var(--accent);}
.upg-card.affordable:hover{transform:translateX(-3px);box-shadow:4px 0 14px rgba(255,255,255,.1);}
.upg-card.maxed{opacity:.7;}
.upg-card.cant{opacity:.45;}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-l{display:flex;align-items:center;gap:9px;}
.cico{font-size:1.7rem;flex-shrink:0;}
.cname{font-family:'Fredoka One',cursive;font-size:.9rem;}
.cdesc{font-size:.66rem;color:rgba(255,255,255,.45);margin-top:2px;line-height:1.3;}
.bbtn{border:none;border-radius:25px;padding:6px 13px;cursor:none;font-family:'Boogaloo',cursive;font-size:.88rem;white-space:nowrap;transition:all .13s;flex-shrink:0;}
.bbtn.ok{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0800;box-shadow:0 3px 0 rgba(0,0,0,.4);}
.bbtn.ok:hover{transform:translateY(-2px);}
.bbtn.no{background:rgba(255,255,255,.07);color:rgba(255,255,255,.28);pointer-events:none;}
.bbtn.done{background:linear-gradient(135deg,var(--gold),var(--accent2));color:#1a0800;pointer-events:none;font-size:.72rem;}
.pips{display:flex;gap:3px;margin-top:7px;}
.pip{height:5px;border-radius:3px;flex:1;background:rgba(255,255,255,.1);transition:background .22s;}
.pip.on{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.pip.on.gold{background:linear-gradient(90deg,var(--gold),#fff176);}
.cstat{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:2px 8px;font-size:.63rem;color:rgba(255,255,255,.6);margin-top:5px;}
.cnxt{color:rgba(100,255,120,.7);margin-left:3px;}
.shop-panel::-webkit-scrollbar{width:3px;}
.shop-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px;}

/* ── MAP SELECT ── */
.map-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1100;display:none;flex-direction:column;align-items:center;overflow-y:auto;padding:20px;}
.map-overlay.open{display:flex;}
.map-title{font-family:'Boogaloo',cursive;font-size:2.5rem;color:var(--accent);text-shadow:0 0 20px var(--glow);margin:16px 0 24px;text-align:center;}
.map-grid{display:flex;flex-direction:column;gap:12px;width:100%;max-width:600px;padding-bottom:30px;}
.map-card{border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;transition:all .2s;}
.map-card.current{border:2px solid var(--accent);background:rgba(255,255,255,.08);}
.map-card.unlocked{border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.04);cursor:none;}
.map-card.unlocked:hover{transform:translateX(4px);border-color:rgba(255,255,255,.4);}
.map-card.locked{border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);opacity:.7;}
.map-card.affordable-lock{border:2px solid var(--gold);background:rgba(255,215,0,.06);animation:glow-pulse 1.5s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 0 rgba(255,215,0,0)}50%{box-shadow:0 0 20px rgba(255,215,0,.3)}}
.map-emoji{font-size:2.8rem;flex-shrink:0;}
.map-info{flex:1;}
.map-name{font-family:'Boogaloo',cursive;font-size:1.3rem;color:var(--text);}
.map-sub{font-size:.75rem;opacity:.55;margin-top:2px;}
.map-status{display:flex;align-items:center;gap:5px;margin-top:6px;font-size:.72rem;}
.map-act-btn{border:none;border-radius:30px;padding:8px 18px;cursor:none;font-family:'Boogaloo',cursive;font-size:.95rem;flex-shrink:0;transition:all .14s;}
.map-act-btn.current-btn{background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);pointer-events:none;}
.map-act-btn.travel-btn{background:linear-gradient(135deg,#5c6bc0,#9c27b0);color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.4);}
.map-act-btn.travel-btn:hover{transform:translateY(-2px);}
.map-act-btn.unlock-btn{background:linear-gradient(135deg,var(--gold),var(--accent));color:#1a0800;box-shadow:0 3px 0 rgba(0,0,0,.4);}
.map-act-btn.unlock-btn:hover{transform:translateY(-2px);}
.map-act-btn.locked-btn{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);pointer-events:none;}
.map-close-btn{position:fixed;top:20px;right:20px;background:rgba(255,80,0,.25);border:1px solid rgba(255,80,0,.4);color:#ff6040;font-size:1.2rem;width:38px;height:38px;border-radius:50%;cursor:none;z-index:1101;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.map-close-btn:hover{transform:rotate(90deg);background:rgba(255,80,0,.4);}
.final-map-card{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,152,0,.08))!important;border-color:rgba(255,215,0,.6)!important;}

/* ── SCENE ── */
.scene{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:88px;}
@keyframes shake{0%{transform:translate(0,0) rotate(0)}15%{transform:translate(-5px,-3px) rotate(-.5deg)}30%{transform:translate(5px,2px) rotate(.4deg)}60%{transform:translate(4px,-2px) rotate(.3deg)}100%{transform:translate(0,0) rotate(0)}}
.scene.shaking{animation:shake .26s ease-out;}

.burger-wrap{position:absolute;bottom:185px;left:50%;transform:translateX(-50%);z-index:150;cursor:none;filter:drop-shadow(0 24px 50px rgba(0,0,0,.85));transition:transform .12s;}
.burger-wrap:hover .burger{transform:scale(1.02) translateY(-4px);}
.burger-wrap:active .burger{transform:scale(.95) rotate(-1.5deg);}
.burger{position:relative;width:320px;display:flex;flex-direction:column;align-items:center;transition:transform .15s cubic-bezier(.34,1.56,.64,1);}

.layer{width:100%;position:relative;transform-origin:center bottom;}
.layer.eL{animation:flyL .3s cubic-bezier(.4,0,.6,1) forwards;}
.layer.eR{animation:flyR .3s cubic-bezier(.4,0,.6,1) forwards;}
.layer.eUp{animation:flyUp .3s cubic-bezier(.4,0,.6,1) forwards;}
@keyframes flyL{0%{transform:scale(1) translate(0,0) rotate(0);opacity:1}100%{transform:scale(.1) translate(-280px,-180px) rotate(-40deg);opacity:0}}
@keyframes flyR{0%{transform:scale(1) translate(0,0) rotate(0);opacity:1}100%{transform:scale(.1) translate(280px,-200px) rotate(35deg);opacity:0}}
@keyframes flyUp{0%{transform:scale(1) translate(0,0) rotate(0);opacity:1}100%{transform:scale(.1) translate(0,-260px) rotate(20deg);opacity:0}}
.layer.ch{animation:ch .2s ease-out;}
@keyframes ch{0%{transform:scaleX(1) scaleY(1)}25%{transform:scaleX(1.14) scaleY(.86)}55%{transform:scaleX(.92) scaleY(1.08)}100%{transform:scaleX(1) scaleY(1)}}
.layer.mch{animation:mch2 .22s ease-out;}
@keyframes mch2{0%{transform:scaleX(1) scaleY(1)}20%{transform:scaleX(1.2) scaleY(.8)}55%{transform:scaleX(.88) scaleY(1.12)}100%{transform:scaleX(1) scaleY(1)}}

/* ── HANDS ── */
.hands{position:fixed;bottom:-22px;left:50%;transform:translateX(-50%);width:520px;height:230px;z-index:200;pointer-events:none;transition:transform .14s,filter .14s;}
.hands.eating{animation:hb .24s ease-out forwards;}
@keyframes hb{0%{transform:translateX(-50%) translateY(0) scale(1)}40%{transform:translateX(-50%) translateY(-38px) rotate(-3deg) scale(1.07)}70%{transform:translateX(-50%) translateY(-30px) rotate(-2deg) scale(1.04)}100%{transform:translateX(-50%) translateY(-30px) rotate(-2deg) scale(1.04)}}
.hands.idle{transform:translateX(-50%) translateY(-30px) rotate(-2deg) scale(1.04);}
.hands.rest{animation:hrest .2s ease-out forwards;}
@keyframes hrest{100%{transform:translateX(-50%) translateY(0) scale(1)}}
.hand{position:absolute;bottom:0;width:210px;height:190px;}
.hand-left{left:14px;}.hand-right{right:14px;transform:scaleX(-1);}
.hand svg{width:100%;height:100%;}

/* ── PROGRESS ── */
.prog-wrap{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:370px;z-index:300;text-align:center;}
.prog-lbl{font-family:'Boogaloo',cursive;font-size:.82rem;color:var(--accent);letter-spacing:2px;margin-bottom:4px;}
.pbar-bg{width:100%;height:22px;background:rgba(255,255,255,.07);border-radius:11px;border:2px solid rgba(255,255,255,.12);overflow:hidden;position:relative;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));background-size:200%;border-radius:9px;transition:width .3s;animation:shim 1.4s linear infinite;}
@keyframes shim{0%{background-position:200% 0}100%{background-position:0 0}}
.pseg{position:absolute;top:0;bottom:0;width:2px;background:rgba(0,0,0,.28);z-index:2;}

/* ── NEW BURGER BTN ── */
.nbtn{position:fixed;bottom:55px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#1a0800;font-family:'Boogaloo',cursive;font-size:1.3rem;letter-spacing:2px;padding:11px 32px;border-radius:50px;cursor:none;box-shadow:0 4px 0 rgba(0,0,0,.4),0 8px 20px var(--glow);transition:all .14s;z-index:300;display:none;}
.nbtn:hover{transform:translateX(-50%) translateY(-3px);}
.nbtn:active{transform:translateX(-50%) translateY(1px);}
.nbtn.vis{display:block;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{0%{transform:translateX(-50%) scale(0) rotate(-8deg);opacity:0}100%{transform:translateX(-50%) scale(1);opacity:1}}

/* ── EFFECTS ── */
.bflash{position:fixed;inset:0;pointer-events:none;z-index:400;opacity:0;transition:opacity .07s;border-radius:0;}
.bflash.show{opacity:1;}
.particle{position:fixed;pointer-events:none;z-index:500;animation:pfly .85s ease-out forwards;}
@keyframes pfly{0%{transform:translate(0,0) scale(1.1) rotate(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0) rotate(var(--tr));opacity:0}}
.ctxt{position:fixed;pointer-events:none;z-index:500;font-family:'Boogaloo',cursive;text-shadow:2px 2px 0 rgba(0,0,0,.5);animation:ctxtA .65s ease-out forwards;white-space:nowrap;}
@keyframes ctxtA{0%{transform:scale(.4) translateY(0);opacity:1}40%{transform:scale(1.3) translateY(-20px);opacity:1}100%{transform:scale(.7) translateY(-52px);opacity:0}}
.mfloat{position:fixed;pointer-events:none;z-index:500;font-family:'Boogaloo',cursive;color:var(--gold);text-shadow:0 0 8px rgba(255,215,0,.5);animation:mfly 1.1s ease-out forwards;}
@keyframes mfly{0%{transform:translateY(0) scale(.7);opacity:1}55%{transform:translateY(-70px) scale(1.1);opacity:1}100%{transform:translateY(-125px) scale(.8);opacity:0}}
.sparkle{position:fixed;pointer-events:none;z-index:501;width:var(--sz);height:var(--sz);background:var(--col);border-radius:50%;animation:spk .5s ease-out forwards;}
@keyframes spk{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1);opacity:0}}

/* ── DONE MSG ── */
.done-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:600;display:none;pointer-events:none;}
.done-msg.vis{display:block;animation:popC .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popC{0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.done-msg h2{font-family:'Boogaloo',cursive;font-size:3rem;color:var(--accent);text-shadow:3px 3px 0 rgba(0,0,0,.5),0 0 24px var(--glow);}
.done-earned{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--gold);margin-top:6px;animation:pe .6s ease-in-out infinite alternate;}
@keyframes pe{from{transform:scale(1)}to{transform:scale(1.08)}}

/* ── WIN SCREEN ── */
.win-screen{position:fixed;inset:0;background:radial-gradient(ellipse at center,#2a2000,#0d0900);z-index:2000;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.win-screen.vis{display:flex;animation:winIn .8s ease-out;}
@keyframes winIn{0%{opacity:0;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
.win-logo{font-size:5rem;animation:spin 3s linear infinite;}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.win-title{font-family:'Boogaloo',cursive;font-size:4.5rem;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.8),4px 4px 0 rgba(0,0,0,.5);margin:10px 0;}
.win-sub{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#fff176;margin-bottom:20px;}
.win-stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.win-stat{background:rgba(255,215,0,.12);border:2px solid rgba(255,215,0,.35);border-radius:14px;padding:10px 20px;text-align:center;}
.win-stat-v{font-family:'Boogaloo',cursive;font-size:2rem;color:var(--gold);}
.win-stat-l{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-top:2px;}
.win-replay{background:linear-gradient(135deg,#ffd700,#ff9800);border:none;color:#1a0800;font-family:'Boogaloo',cursive;font-size:1.4rem;padding:14px 40px;border-radius:50px;cursor:none;box-shadow:0 5px 0 rgba(0,0,0,.4);transition:all .14s;margin-top:10px;}
.win-replay:hover{transform:translateY(-3px);}

/* ── MAP TRANSITION ── */
.map-trans{position:fixed;inset:0;z-index:1900;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;}
.map-trans.go{animation:transAnim 1.2s ease-in-out forwards;}
@keyframes transAnim{0%{opacity:0}20%{opacity:1}50%{opacity:1}80%{opacity:1}100%{opacity:0}}
.trans-bg{position:absolute;inset:0;background:var(--bg);}
.trans-txt{font-family:'Boogaloo',cursive;font-size:2.5rem;color:var(--accent);text-shadow:0 0 20px var(--glow);z-index:1;text-align:center;}

/* ── MISC ── */
.hint{position:fixed;top:66px;left:50%;transform:translateX(-50%);font-size:.72rem;opacity:.35;letter-spacing:3px;text-transform:uppercase;pointer-events:none;animation:hp 2.5s ease-in-out infinite;white-space:nowrap;}
@keyframes hp{0%,100%{opacity:.18}50%{opacity:.42}}
.auto-lbl{position:fixed;bottom:46px;right:16px;z-index:300;font-family:'Boogaloo',cursive;font-size:.72rem;color:rgba(255,255,255,.4);display:none;}
.auto-lbl.on{display:block;animation:hp 1s ease-in-out infinite;}
.combo-lbl{position:fixed;top:66px;left:16px;z-index:300;font-family:'Boogaloo',cursive;font-size:1rem;display:none;}
.combo-lbl.on{display:block;animation:hp .4s ease-in-out infinite;}
.toast{position:fixed;top:64px;right:16px;z-index:800;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0800;border-radius:10px;padding:8px 14px;font-family:'Boogaloo',cursive;font-size:.9rem;box-shadow:0 4px 16px var(--glow);transform:translateX(220px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.toast.show{transform:translateX(0);}
.bg-amb{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.amb-particle{position:absolute;animation:ambFloat var(--d) ease-in-out infinite;opacity:.3;font-size:var(--fs);}
@keyframes ambFloat{0%{transform:translate(0,100vh) rotate(0);opacity:0}10%{opacity:.25}90%{opacity:.15}100%{transform:translate(var(--dx),0) rotate(360deg);opacity:0}}
.table{position:fixed;bottom:0;left:0;right:0;height:190px;background:linear-gradient(to top,var(--bg),transparent);z-index:50;pointer-events:none;}
</style>
</head>

    <div class="hand hand-right">

let currentLayer=0, eating=false, shopOpen=false;

let autoInterval=null, sauceInterval=null, prevAffordable=0;

let ambInterval=null;

/* ══════════════════════════════════════
   CURSOR
══════════════════════════════════════ */
const mc = document.getElementById('mc');
document.addEventListener('mousemove', e=>{mc.style.left=e.clientX+'px';mc.style.top=e.clientY+'px';});
function setMC(e){
  if(shopOpen){mc.textContent='🖱️';mc.className='mc shop';return;}
  const emojis={idle:'😮',chomp:'😬',done:'😋',travel:'🚀',win:'👑'};
  mc.textContent=emojis[e]||'😮';
  mc.className='mc'+(e==='chomp'?' chomp':'');
}

/* ══════════════════════════════════════
   THEME
══════════════════════════════════════ */
function applyTheme(mapId){
  const m=MAPS[mapId]; const r=document.documentElement.style;
  r.setProperty('--accent',m.accent); r.setProperty('--accent2',m.accent2);
  r.setProperty('--bg',m.bgBase); r.setProperty('--card',m.card);
  r.setProperty('--border',m.border); r.setProperty('--gold',m.gold);
  r.setProperty('--glow',m.glow);
  document.body.style.background=m.bg;
  document.getElementById('tableEl').style.background=`linear-gradient(to top,${m.bgBase},transparent)`;
  document.getElementById('mapChip').textContent=`${m.emoji} ${m.name}`;
  spawnAmbient(m.ambient);
}

function spawnAmbient(emojis){
  const amb=document.getElementById('bgAmb'); amb.innerHTML='';
  clearInterval(ambInterval);
  function spawn(){
    if(!emojis.length) return;
    const el=document.createElement('div'); el.className='amb-particle';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const dur=8+Math.random()*12; const dx=(Math.random()-.5)*120;
    el.style.cssText=`left:${Math.random()*100}%;bottom:-50px;--d:${dur}s;--dx:${dx}px;--fs:${14+Math.random()*10}px;animation-delay:${Math.random()*8}s;`;
    amb.appendChild(el); setTimeout(()=>el.remove(),(dur+2)*1000);
  }
  for(let i=0;i<8;i++) setTimeout(spawn,i*500);
  ambInterval=setInterval(spawn,1800);
}

/* ══════════════════════════════════════
   MONEY
══════════════════════════════════════ */
function addMoney(amt,x,y,lbl,big){
  money+=amt; totalEarned+=amt;
  const el=document.getElementById('moneyVal');
  el.textContent='$'+money; el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  document.getElementById('shopBal').textContent='$'+money;
  document.getElementById('totalEarned').textContent=totalEarned;
  spawnFloat(amt,x,y,lbl,big); checkAffordable();
}
function spawnFloat(amt,x,y,lbl,big){
  const el=document.createElement('div'); el.className='mfloat';
  el.textContent=lbl||'+$'+amt;
  el.style.left=((x||window.innerWidth/2)-45)+'px';
  el.style.top=((y||window.innerHeight/2))+'px';
  if(big||amt>=20){el.style.fontSize='1.9rem';el.style.color=MAPS[currentMapId].gold;}
  document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
}
function setupSauce(){
  clearInterval(sauceInterval); sauceInterval=null;
  const rate=UPG.passive.vals[UPG.passive.level];
  if(rate>0) sauceInterval=setInterval(()=>addMoney(rate,window.innerWidth*(.3+Math.random()*.4),80,`💧+$${rate}`),1000);
}

/* shared util: create a rounded rect layer */
function makeRect(w,h,bg,extra='',mb=-2){
  const d=document.createElement('div');
  d.style.cssText=`width:${w}px;height:${h}px;background:${bg};border-radius:8px;margin-bottom:${mb}px;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.3);${extra}`;
  return wrap(d);
}

  return wrap(d);
}
function makeBunTop(col1,col2,seedCol,dripCol){
  const b=document.createElement('div');
  b.style.cssText=`width:310px;height:100px;background:radial-gradient(ellipse at 40% 30%,${col1} 0%,${col2} 60%,${col2}aa 100%);border-radius:50% 50% 30% 30%/60% 60% 30% 30%;box-shadow:inset 0 -8px 16px rgba(0,0,0,.25),inset 0 8px 20px rgba(255,255,255,.1),0 4px 0 ${col2}88;position:relative;margin-bottom:-2px;`;
  const shine=document.createElement('div');
  shine.style.cssText=`position:absolute;top:12px;left:30px;right:30px;height:35px;background:radial-gradient(ellipse,rgba(255,255,255,.2),transparent 70%);border-radius:50%;`;
  b.appendChild(shine);
  [{x:30,y:18,w:14,h:7,r:-15},{x:70,y:12,w:18,h:8,r:10},{x:120,y:8,w:16,h:7,r:-5},{x:170,y:14,w:15,h:7,r:20},{x:220,y:10,w:17,h:8,r:-10},{x:260,y:20,w:14,h:6,r:15},{x:50,y:35,w:15,h:7,r:5},{x:100,y:30,w:18,h:8,r:-20},{x:150,y:28,w:16,h:7,r:12},{x:200,y:32,w:15,h:7,r:-8},{x:240,y:38,w:13,h:6,r:18}]
  .forEach(s=>{const d=document.createElement('div');d.style.cssText=`position:absolute;background:${seedCol};border-radius:50% 50% 40% 40%;box-shadow:inset 0 1px 3px rgba(255,255,255,.4);left:${s.x}px;top:${s.y}px;width:${s.w}px;height:${s.h}px;transform:rotate(${s.r}deg);`;b.appendChild(d);});
  for(let i=0;i<3;i++){const d=document.createElement('div');d.style.cssText=`position:absolute;width:8px;background:linear-gradient(to bottom,${dripCol},${dripCol}88);border-radius:0 0 4px 4px;bottom:-12px;left:${40+i*80}px;animation:drip 2s ease-in ${i*.7}s infinite;opacity:.8;`;b.appendChild(d);}
  return wrap(b);
}
function makeBunBot(col1,col2){
  const d=document.createElement('div');
  d.style.cssText=`width:310px;height:45px;background:radial-gradient(ellipse at 40% 20%,${col1},${col2} 60%,${col2}88 100%);border-radius:8px 8px 30px 30px/8px 8px 20px 20px;position:relative;box-shadow:inset 0 4px 10px rgba(255,255,255,.1),0 6px 0 ${col2}88,0 10px 20px rgba(0,0,0,.4);`;
  const s=document.createElement('div');s.style.cssText=`position:absolute;top:6px;left:20px;right:20px;height:12px;background:radial-gradient(ellipse,rgba(255,255,255,.2),transparent 70%);border-radius:50%;`;d.appendChild(s);
  return wrap(d);
}
function makePatty(col1,col2,marks=true){
  const d=document.createElement('div');
  d.style.cssText=`width:300px;height:38px;background:radial-gradient(ellipse at 40% 35%,${col1} 0%,${col2} 60%,${col2}55 100%);border-radius:8px;margin-bottom:-2px;overflow:hidden;position:relative;box-shadow:inset 0 4px 10px rgba(255,255,255,.05),inset 0 -4px 10px rgba(0,0,0,.5),0 3px 0 ${col2}55;`;
  if(marks){const g=document.createElement('div');g.style.cssText=`position:absolute;inset:6px;background:repeating-linear-gradient(30deg,transparent 0,transparent 6px,rgba(0,0,0,.2) 6px,rgba(0,0,0,.2) 8px);border-radius:6px;`;d.appendChild(g);}
  return wrap(d);
}
function makeSlices(count,h,colors,gap=5){
  const o=document.createElement('div');
  o.style.cssText=`width:310px;height:${h}px;margin-bottom:-2px;display:flex;gap:${gap}px;align-items:center;justify-content:center;`;
  for(let i=0;i<count;i++){const s=document.createElement('div');const w=28+Math.random()*20|0;s.style.cssText=`height:${h}px;width:${w}px;border-radius:${h/2}px;background:${colors[i%colors.length]};box-shadow:inset 0 2px 4px rgba(255,255,255,.2);`;o.appendChild(s);}
  return wrap(o);
}
function makeCheese(col='#f5c518',drip=true){
  const d=document.createElement('div');
  d.style.cssText=`width:330px;height:14px;background:linear-gradient(to bottom,#fdd835,${col},${col}bb);margin-bottom:-2px;position:relative;box-shadow:0 3px 8px rgba(200,150,0,.3);`;
  if(drip){const dr=document.createElement('div');dr.style.cssText=`position:absolute;bottom:-8px;left:-10px;width:350px;height:12px;background:${col};clip-path:polygon(0 0,100% 0,97% 100%,94% 40%,90% 100%,85% 30%,80% 100%,75% 40%,70% 100%,65% 30%,60% 100%,55% 40%,50% 100%,45% 30%,40% 100%,35% 40%,30% 100%,25% 30%,20% 100%,15% 40%,10% 100%,5% 30%,3% 100%);z-index:2;opacity:.85;`;d.appendChild(dr);}
  return wrap(d);
}

function buildBurger(){
  const b=document.getElementById('burger'); b.innerHTML='';
  currentLayer=0; eating=false;
  document.getElementById('pbarFill').style.width='0%'; buildSegs();
  const m=MAPS[currentMapId]; const fns={classic:buildClassicBurger,fish:buildFishBurger,veggie:buildVeggieBurger,spicy:buildSpicyBurger,alien:buildAlienBurger,golden:buildGoldenBurger};
  const layers=(fns[m.type]||buildClassicBurger)();
  layers.forEach((el,i)=>{el.id='L'+i;b.appendChild(el);});
  // aura
  if(UPG.aura.level>0){
    const auraColors=['','rgba(205,127,50,.4)','rgba(192,192,192,.4)','rgba(255,0,255,.2),rgba(0,255,255,.2),rgba(255,215,0,.2)'];
    b.style.filter=`drop-shadow(0 0 ${UPG.aura.level*8}px ${auraColors[UPG.aura.level]||'rgba(255,215,0,.3)'})`;
  } else { b.style.filter=''; }
  document.getElementById('doneMsg').classList.remove('vis');
  document.getElementById('nbtn').classList.remove('vis');
  document.getElementById('progWrap').style.display='block';
  document.getElementById('hint').style.display='block';
  setMC('idle'); combo=0; updateCombo();
  setupAutoMunch();
}
function buildSegs(){
  const bg=document.getElementById('pbarBg'); bg.querySelectorAll('.pseg').forEach(s=>s.remove());
  const t=MAPS[currentMapId].layers;
  for(let i=1;i<t;i++){const s=document.createElement('div');s.className='pseg';s.style.left=(i/t*100)+'%';bg.appendChild(s);}
}

/* ══════════════════════════════════════
   EATING
══════════════════════════════════════ */
const CHOMPS=['CHOMP!','MUNCH!','NOM!','CRUNCH!','GULP!','SLURP!','DEVOUR!','GNAW!','RAVAGE!','INHALE!','OM NOM!'];
const PFOOD=['🧀','🥬','🍅','🥩','🧅','🥒','🍔','✨','⭐','💥','🔥','🫓'];

function getCd(){return UPG.speed.vals[UPG.speed.level];}
function getLpp(){return UPG.biteSize.vals[UPG.biteSize.level];}
const TOTAL=()=>MAPS[currentMapId].layers;
const LAYER_COLORS=['rgba(200,120,40,.28)','rgba(76,175,80,.28)','rgba(229,57,53,.28)','rgba(245,197,24,.32)','rgba(90,45,12,.3)','rgba(206,147,216,.28)','rgba(124,179,66,.28)','rgba(200,120,40,.28)','rgba(255,215,0,.3)','rgba(255,215,0,.3)','rgba(255,215,0,.3)','rgba(255,215,0,.3)'];

function takeBite(e, isAuto){
  if(eating) return; if(currentLayer>=TOTAL()) return;
  eating=true; bites++; totalBites++;
  document.getElementById('biteCount').textContent=bites;

  let lpp=getLpp();
  if(UPG.jawStr.level>0 && Math.random()<UPG.jawStr.vals[UPG.jawStr.level]) lpp++;
  const toEat=Math.min(lpp,TOTAL()-currentLayer);
  const isCrit=UPG.critBite.level>0&&Math.random()<UPG.critBite.vals[UPG.critBite.level];

  setMC('chomp');
  const hands=document.getElementById('hands');
  hands.classList.remove('rest'); hands.className='hands eating';

  const flash=document.getElementById('bflash');
  flash.className='bflash show';
  flash.style.background=`radial-gradient(ellipse at center,${LAYER_COLORS[currentLayer]||'rgba(255,200,50,.2)'},transparent 65%)`;
  setTimeout(()=>flash.className='bflash',140);

  if(UPG.shake.level>0){const s=document.getElementById('scene');s.classList.add('shaking');setTimeout(()=>s.classList.remove('shaking'),270);}

  if(!isAuto){
    const word=isCrit?'💥 CRITICAL BITE!':CHOMPS[Math.floor(Math.random()*CHOMPS.length)];
    const cx=e?e.clientX:window.innerWidth/2; const cy=e?e.clientY:window.innerHeight/2;
    const ct=document.createElement('div'); ct.className='ctxt';
    ct.textContent=word;
    const sz=isCrit?2.6:(toEat>1?2.4:1.9)+(UPG.megaMouth.level*.25);
    ct.style.cssText=`left:${cx-65}px;top:${cy-60}px;font-size:${sz}rem;color:${isCrit?'#ff4444':'#ffca28'};`;
    document.body.appendChild(ct); setTimeout(()=>ct.remove(),680);

    const pc=4+UPG.megaMouth.level*2+(toEat>1?4:0)+(isCrit?8:0);
    for(let i=0;i<pc;i++){
      const p=document.createElement('div'); p.className='particle';
      p.textContent=PFOOD[Math.floor(Math.random()*PFOOD.length)];
      p.style.fontSize=(15+UPG.megaMouth.level*3)+'px';
      const ang=Math.random()*Math.PI*2; const dist=50+Math.random()*100;
      p.style.cssText+=`left:${cx}px;top:${cy}px;--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist-45}px;--tr:${Math.random()*360}deg;animation-delay:${Math.random()*.1}s;`;
      document.body.appendChild(p); setTimeout(()=>p.remove(),900);
    }

    const sc=UPG.sparks.vals[UPG.sparks.level];
    if(sc>0){
      const cols=['#ffd700','#ff9800','#ff4444','#4cff88','#44ccff','#ff88ff'];
      for(let i=0;i<sc;i++){
        const sp=document.createElement('div'); sp.className='sparkle';
        const ang=Math.random()*Math.PI*2; const dist=40+Math.random()*80;
        sp.style.cssText=`left:${cx}px;top:${cy}px;--sz:${4+Math.random()*6}px;--col:${cols[Math.floor(Math.random()*cols.length)]};--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist}px;`;
        document.body.appendChild(sp); setTimeout(()=>sp.remove(),520);
      }
    }
    if(UPG.drool.level>0 && Math.random()<UPG.drool.vals[UPG.drool.level]){
      setTimeout(()=>addMoney(1,cx,cy,'💧+$1'),300);
    }
  }

  if(UPG.combo.level>0){combo=Math.min(combo+1,12);clearTimeout(comboTimer);comboTimer=setTimeout(()=>{combo=0;updateCombo();},COMBO_WIN);updateCombo();}

  if(UPG.goldenJaw.level>0&&Math.random()<UPG.goldenJaw.chances[UPG.goldenJaw.level]){
    let b=UPG.goldenJaw.bonuses[UPG.goldenJaw.level]; if(isCrit)b*=10;
    const bx=e?e.clientX:window.innerWidth/2; const by=e?(e.clientY-40):window.innerHeight/2-40;
    setTimeout(()=>addMoney(b,bx,by,'⭐+$'+b),180);
  }
  if(isCrit&&!isAuto){
    const cb=UPG.cashMult.earn();
    setTimeout(()=>addMoney(cb,e?e.clientX:window.innerWidth/2,e?(e.clientY-60):window.innerHeight/2-60,'💥CRIT +$'+cb,true),120);
  }

  const cls=toEat>1?'mch':'ch';
  const flyClasses=['eL','eR','eUp'];
  for(let i=0;i<toEat;i++){
    const lEl=document.getElementById('L'+(currentLayer+i)); if(!lEl) continue;
    lEl.classList.add(cls);
    setTimeout(()=>{lEl.classList.remove(cls);lEl.classList.add(flyClasses[(currentLayer+i)%3]);},80+i*55);
  }

  setTimeout(()=>{
    currentLayer+=toEat;
    document.getElementById('pbarFill').style.width=(currentLayer/TOTAL()*100)+'%';
    setMC('idle');
    hands.classList.remove('eating'); hands.className='hands idle';
    setTimeout(()=>{hands.className='hands rest';},500);
    if(currentLayer>=TOTAL()) finishBurger(e);
    setTimeout(()=>{eating=false;},Math.max(0,getCd()-280));
  },290);
}

function updateCombo(){
  const el=document.getElementById('comboLbl');
  if(combo>=3&&UPG.combo.level>0){
    const maxM=UPG.combo.vals[UPG.combo.level]; const m=Math.min(maxM,1+(combo-2)*.25);
    el.textContent=`🔥 COMBO x${m.toFixed(1)}`;
    el.style.color=MAPS[currentMapId].accent; el.classList.add('on');
  } else el.classList.remove('on');
}

function finishBurger(e){
  burgers++; totalBurgers++; burgerStreak++;
  document.getElementById('burgerCount').textContent=burgers;
  clearInterval(autoInterval); autoInterval=null;
  document.getElementById('autoLbl').classList.remove('on');

  let m=1;
  if(UPG.combo.level>0&&combo>=3){const maxM=UPG.combo.vals[UPG.combo.level];m=Math.min(maxM,1+(combo-2)*.25);}
  combo=0; updateCombo();

  const base=UPG.cashMult.earn();
  const str=UPG.streak.vals[UPG.streak.level]*(burgerStreak-1);
  const earned=Math.round(base*m)+str;
  const cx=window.innerWidth/2; const cy=window.innerHeight/2-70;
  addMoney(earned,cx,cy,m>1?`🔥x${m.toFixed(1)} +$${earned}`:`+$${earned}`,true);

  let etxt=`💰 Earned $${earned}`;
  if(m>1) etxt+=` (COMBO x${m.toFixed(1)})`;
  if(str>0) etxt+=` + $${str} streak!`;
  document.getElementById('doneEarned').textContent=etxt;

  setTimeout(()=>{
    // Check win on final map
    if(MAPS[currentMapId].isFinal){ showWin(); return; }

    const h2=document.getElementById('doneTxt');
    const labels=['BURGER DEMOLISHED! 🎉','FISH DEVOURED! 🐟','VEGGIES CONSUMED! 🌿','INFERNO EATEN! 🌋','ALIEN ABSORBED! 🚀'];
    h2.textContent=labels[currentMapId]||'BURGER DEMOLISHED! 🎉';
    document.getElementById('doneMsg').classList.add('vis');
    document.getElementById('hint').style.display='none';

    for(let i=0;i<20;i++) setTimeout(()=>{
      const p=document.createElement('div'); p.className='particle';
      p.textContent=['🎉','🍔','⭐','✨','🎊','💰','🥳','🏆'][Math.floor(Math.random()*8)];
      p.style.cssText=`left:${12+Math.random()*76}%;top:${22+Math.random()*38}%;font-size:${18+Math.random()*22}px;--tx:${(Math.random()-.5)*240}px;--ty:${-80-Math.random()*170}px;--tr:${Math.random()*720}deg;animation-duration:1.4s;`;
      document.body.appendChild(p); setTimeout(()=>p.remove(),1500);
    },i*75);

    if(UPG.autoOrder.level>0){ setTimeout(()=>newBurger(),800); }
    else { document.getElementById('nbtn').classList.add('vis'); }
    setMC('done');
  },350);
}

function newBurger(){ document.getElementById('progWrap').style.display='block'; buildBurger(); }

function showWin(){
  document.getElementById('winScreen').classList.add('vis');
  const ws=document.getElementById('winStats');
  ws.innerHTML=`
    <div class="win-stat"><div class="win-stat-v">${totalBurgers}</div><div class="win-stat-l">Burgers Eaten</div></div>
    <div class="win-stat"><div class="win-stat-v">${totalBites}</div><div class="win-stat-l">Total Bites</div></div>
    <div class="win-stat"><div class="win-stat-v">$${totalEarned}</div><div class="win-stat-l">Total Earned</div></div>
    <div class="win-stat"><div class="win-stat-v">${currentMapId+1}/6</div><div class="win-stat-l">Maps Beaten</div></div>`;
  for(let i=0;i<50;i++) setTimeout(()=>{
    const p=document.createElement('div'); p.className='particle';
    p.textContent=['👑','✨','💛','🌟','🍔','🏆'][Math.floor(Math.random()*6)];
    p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*80}%;font-size:${18+Math.random()*28}px;--tx:${(Math.random()-.5)*300}px;--ty:${-100-Math.random()*200}px;--tr:${Math.random()*720}deg;animation-duration:${1.2+Math.random()*.8}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),2100);
  },i*120);
}
function resetGame(){
  money=0;bites=0;burgers=0;totalEarned=0;currentLayer=0;eating=false;
  combo=0;burgerStreak=0;totalBurgers=0;totalBites=0;currentMapId=0;
  Object.values(UPG).forEach(u=>u.level=0);
  document.getElementById('winScreen').classList.remove('vis');
  document.getElementById('moneyVal').textContent='$0';
  document.getElementById('burgerCount').textContent='0';
  document.getElementById('biteCount').textContent='0';
  document.getElementById('totalEarned').textContent='0';
  clearInterval(sauceInterval);clearInterval(autoInterval);clearInterval(ambInterval);
  applyTheme(0); buildBurger(); renderTabs();
}

/* ══════════════════════════════════════
   AUTO MUNCH
══════════════════════════════════════ */
function setupAutoMunch(){
  clearInterval(autoInterval); autoInterval=null;
  if(UPG.autoMunch.level>0){
    document.getElementById('autoLbl').classList.add('on');
    autoInterval=setInterval(()=>{if(currentLayer<TOTAL()&&!eating)takeBite(null,true);},UPG.autoMunch.vals[UPG.autoMunch.level]);
  } else document.getElementById('autoLbl').classList.remove('on');
}

function toggleShop(){shopOpen?closeShop():openShop();}
function openShop(){
  shopOpen=true;
  document.getElementById('shopPanel').classList.add('open');
  document.getElementById('shopOverlay').classList.add('open');
  setMC('shop'); renderTabs(); renderUpgrades();
}
function closeShop(){
  shopOpen=false;
  document.getElementById('shopPanel').classList.remove('open');
  document.getElementById('shopOverlay').classList.remove('open');
  setMC('idle');
}
function renderTabs(){
  const row=document.getElementById('tabRow'); row.innerHTML='';
  Object.entries(CATS).forEach(([k,c])=>{
    const t=document.createElement('button'); t.className='tab'+(k===activeTab?' active':'');
    t.textContent=c.label; t.onclick=()=>{activeTab=k;renderTabs();renderUpgrades();};
    row.appendChild(t);
  });
}
function renderUpgrades(){
  const body=document.getElementById('upgBody'); body.innerHTML='';
  const sec=document.createElement('div'); sec.className='upg-sec';
  CATS[activeTab].keys.forEach(key=>{
    const u=UPG[key]; const maxed=u.level>=u.max; const cost=maxed?null:u.costs[u.level]; const afford=!maxed&&money>=cost;
    const card=document.createElement('div'); card.className='upg-card'+(maxed?' maxed':afford?' affordable':' cant');
    const row=document.createElement('div'); row.className='card-row';
    const left=document.createElement('div'); left.className='card-l';
    const ic=document.createElement('div'); ic.className='cico'; ic.textContent=u.icon;
    const nd=document.createElement('div');
    const nm=document.createElement('div'); nm.className='cname'; nm.textContent=u.name;
    const ds=document.createElement('div'); ds.className='cdesc'; ds.textContent=u.desc;
    nd.appendChild(nm); nd.appendChild(ds); left.appendChild(ic); left.appendChild(nd); row.appendChild(left);
    const btn=document.createElement('button'); btn.className='bbtn';
    if(maxed){btn.className+=' done';btn.textContent='✓ MAX';}
    else if(afford){btn.className+=' ok';btn.textContent='$'+cost;btn.onclick=()=>buyUpgrade(key);}
    else{btn.className+=' no';btn.textContent='$'+cost;}
    row.appendChild(btn); card.appendChild(row);
    const stat=document.createElement('div'); stat.className='cstat'; stat.textContent=u.stat();
    const nxt=u.nxt(); if(nxt&&!maxed){const ns=document.createElement('span');ns.className='cnxt';ns.textContent=' '+nxt;stat.appendChild(ns);}
    card.appendChild(stat);
    const pips=document.createElement('div'); pips.className='pips';
    for(let i=0;i<u.max;i++){const pip=document.createElement('div');pip.className='pip'+(i<u.level?(u.level>=u.max?' on gold':' on'):'');pips.appendChild(pip);}
    card.appendChild(pips); sec.appendChild(card);
  });
  body.appendChild(sec);
  document.getElementById('shopBal').textContent='$'+money;
}
function buyUpgrade(key){
  const u=UPG[key]; if(u.level>=u.max) return; const cost=u.costs[u.level]; if(money<cost) return;
  money-=cost; u.level++;
  document.getElementById('moneyVal').textContent='$'+money;
  if(key==='autoMunch') setupAutoMunch();
  if(key==='sauceDrip'||key==='passive') setupSauce();
  if(key==='aura') buildBurger();
  renderUpgrades();
  const p=document.createElement('div');p.className='particle';p.textContent=u.icon;p.style.fontSize='2rem';
  p.style.cssText+=`left:50%;top:50%;--tx:${(Math.random()-.5)*100}px;--ty:-100px;--tr:${Math.random()*360}deg;animation-duration:.9s;`;
  document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
  checkAffordable();
}
function checkAffordable(){
  let cnt=0; Object.values(UPG).forEach(u=>{if(u.level<u.max&&money>=u.costs[u.level])cnt++;});
  const notif=document.getElementById('shopNotif');
  if(cnt>0){notif.textContent=cnt;notif.style.display='inline-block';if(cnt>prevAffordable&&!shopOpen)showToast();}
  else notif.style.display='none';
  prevAffordable=cnt;
  if(shopOpen) renderUpgrades();
}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

/* ══════════════════════════════════════
   MAP SELECT
══════════════════════════════════════ */
let mapOverlayOpen=false;
let unlockedMaps=[0]; // track unlocked map IDs

function openMaps(){
  mapOverlayOpen=true;
  document.getElementById('mapOverlay').classList.add('open');
  setMC('travel'); renderMapGrid();
}
function closeMaps(){
  mapOverlayOpen=false;
  document.getElementById('mapOverlay').classList.remove('open');
  setMC('idle');
}
function renderMapGrid(){
  const grid=document.getElementById('mapGrid'); grid.innerHTML='';
  MAPS.forEach(m=>{
    const isCurrent=m.id===currentMapId;
    const isUnlocked=unlockedMaps.includes(m.id);
    const canUnlock=!isUnlocked&&money>=m.unlockCost&&(m.id===0||unlockedMaps.includes(m.id-1));
    const locked=!isUnlocked&&!canUnlock;

    const card=document.createElement('div');
    card.className='map-card '+(isCurrent?'current':isUnlocked?'unlocked':canUnlock?'affordable-lock':'locked');
    if(m.isFinal) card.classList.add('final-map-card');

    const left=document.createElement('div'); left.style.cssText='display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;';
    const em=document.createElement('div'); em.className='map-emoji'; em.textContent=m.emoji;
    left.appendChild(em);

    // small color dot
    const dot=document.createElement('div');
    dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${m.accent};box-shadow:0 0 6px ${m.accent};`;
    left.appendChild(dot);

    const info=document.createElement('div'); info.className='map-info';
    const name=document.createElement('div'); name.className='map-name'; name.textContent=m.name;
    const sub=document.createElement('div'); sub.className='map-sub'; sub.textContent=m.sub;
    const status=document.createElement('div'); status.className='map-status';
    if(isCurrent) status.innerHTML=`<span style="color:${m.accent}">● CURRENT MAP</span>`;
    else if(isUnlocked) status.innerHTML=`<span style="opacity:.5">✓ Unlocked</span>`;
    else if(m.unlockCost===0) status.innerHTML='<span style="color:#66bb6a">✓ Free</span>';
    else if(canUnlock) status.innerHTML=`<span style="color:#ffd700">💰 Unlock for $${m.unlockCost.toLocaleString()}</span>`;
    else if(locked&&unlockedMaps.includes(m.id-1)||m.id===1) status.innerHTML=`<span style="opacity:.4">🔒 Need $${m.unlockCost.toLocaleString()} (have $${money})</span>`;
    else status.innerHTML=`<span style="opacity:.3">🔒 Clear previous maps first</span>`;
    info.appendChild(name); info.appendChild(sub); info.appendChild(status);

    const btn=document.createElement('button'); btn.className='map-act-btn';
    if(isCurrent){btn.className+=' current-btn';btn.textContent='PLAYING';}
    else if(isUnlocked){
      btn.className+=' travel-btn'; btn.textContent='TRAVEL';
      btn.onclick=()=>travelToMap(m.id);
    } else if(canUnlock){
      btn.className+=' unlock-btn'; btn.textContent=`UNLOCK $${m.unlockCost.toLocaleString()}`;
      btn.onclick=()=>unlockMap(m.id);
    } else {
      btn.className+=' locked-btn'; btn.textContent=m.id===0||unlockedMaps.includes(m.id-1)?`$${m.unlockCost.toLocaleString()}`:'🔒';
    }

    card.appendChild(left); card.appendChild(info); card.appendChild(btn);
    grid.appendChild(card);
  });
}

function unlockMap(id){
  const m=MAPS[id]; if(money<m.unlockCost) return;
  money-=m.unlockCost;
  document.getElementById('moneyVal').textContent='$'+money;
  unlockedMaps.push(id);
  travelToMap(id);
}

function travelToMap(id){
  if(id===currentMapId){closeMaps();return;}
  closeMaps();
  // Reset upgrades
  Object.values(UPG).forEach(u=>u.level=0);
  clearInterval(autoInterval); clearInterval(sauceInterval); autoInterval=null; sauceInterval=null;
  burgers=0; bites=0; burgerStreak=0;
  document.getElementById('burgerCount').textContent='0';
  document.getElementById('biteCount').textContent='0';
  prevAffordable=0;
  // Transition animation
  const trans=document.getElementById('mapTrans');
  const m=MAPS[id];
  document.getElementById('transTxt').innerHTML=`${m.emoji}<br>Traveling to ${m.name}...<br><span style="font-size:.9rem;opacity:.6">(Upgrades reset)</span>`;
  trans.classList.add('go');
  setTimeout(()=>{
    currentMapId=id; applyTheme(id); buildBurger(); renderTabs();
    checkAffordable();
  },600);
  setTimeout(()=>{trans.classList.remove('go');},1200);
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
applyTheme(0);
buildBurger();
renderTabs();

// CSS drip keyframe needed
const style=document.createElement('style');
style.textContent=`@keyframes drip{0%,70%{height:0}85%{height:16px;opacity:.8}100%{height:16px;opacity:0;transform:translateY(8px)}}`;
document.head.appendChild(style);
</script>
