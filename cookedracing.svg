    <line x1="44" y1="-62" x2="62" y2="-62" stroke="#444" stroke-width="5"/>
    <line x1="-44" y1="52" x2="-62" y2="52" stroke="#444" stroke-width="7"/>
    <line x1="44" y1="52" x2="62" y2="52" stroke="#444" stroke-width="7"/>
