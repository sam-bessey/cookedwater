<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a0400"/>
      <stop offset="55%" stop-color="#0a0005"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2800" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff2800" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#880a00"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff9966"/>
      <stop offset="35%" stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#991100"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff3300" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff3300" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="oval">
      <ellipse cx="400" cy="400" rx="370" ry="370"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="400" cy="400" r="370" fill="none" stroke="#ff2200" stroke-width="2" opacity="0.4"/>
  <circle cx="400" cy="400" r="365" fill="none" stroke="#ff6600" stroke-width="0.5" opacity="0.2"/>

  <!-- Subtle glow core -->
  <ellipse cx="400" cy="400" rx="320" ry="280" fill="url(#glow1)"/>

