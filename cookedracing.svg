    <ellipse cx="82" cy="52" rx="20" ry="25" fill="#111"/>
    <ellipse cx="-82" cy="52" rx="11" ry="14" fill="#ff2200" opacity="0.7"/>
    <ellipse cx="82" cy="52" rx="11" ry="14" fill="#ff2200" opacity="0.7"/>
    <!-- Wheel axles -->
