    <line x1="60" y1="390" x2="240" y2="400" stroke="#ff4400" stroke-width="1.5"/>
    <line x1="40" y1="406" x2="230" y2="412" stroke="#ff4400" stroke-width="0.8"/>
    <line x1="70" y1="374" x2="220" y2="386" stroke="#ff6600" stroke-width="0.6"/>
    <line x1="560" y1="390" x2="748" y2="400" stroke="#ff4400" stroke-width="1.5"/>
