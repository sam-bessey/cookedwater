    <line x1="580" y1="374" x2="740" y2="386" stroke="#ff6600" stroke-width="0.6"/>
  </g>

  <!-- F1 Car silhouette (top-down view, centered) -->
  <g transform="translate(400, 310)" filter="url(#glow)">
    <!-- Car body -->
    <ellipse cx="0" cy="0" rx="44" ry="88" fill="url(#carGrad)"/>
    <!-- Nose cone -->
    <path d="M -12 -88 L 0 -120 L 12 -88 Z" fill="#cc1100"/>
    <!-- Rear diffuser -->
    <path d="M -44 68 L -54 88 L 54 88 L 44 68 Z" fill="#770800"/>
    <!-- Sidepods -->
    <rect x="-68" y="-32" width="24" height="56" rx="6" fill="#cc1100"/>
    <rect x="44" y="-32" width="24" height="56" rx="6" fill="#cc1100"/>
    <!-- Cockpit -->
    <ellipse cx="0" cy="-14" rx="16" ry="22" fill="#0a0a0a"/>
    <!-- Halo bar -->
    <rect x="-18" y="-28" width="36" height="5" rx="2" fill="#888"/>
    <!-- Front wing -->
